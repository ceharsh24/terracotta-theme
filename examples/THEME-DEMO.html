<meta charset="UTF-8">

<title>Terracotta Theme - Comprehensive Token Demo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #111;
    color: #ddd;
    padding: 1.5rem;
  }
  h1 { text-align: center; color: #E98665; margin-bottom: 0.3rem; font-size: 1.5rem; }
  .subtitle { text-align: center; color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; }
  .controls {
    display: flex; gap: 0.4rem; justify-content: center;
    flex-wrap: wrap; margin-bottom: 1.5rem;
  }
  .theme-btn {
    padding: 0.4rem 0.9rem; border: 1px solid #444; border-radius: 5px;
    background: transparent; color: #ccc; cursor: pointer; font-size: 0.8rem;
  }
  .theme-btn:hover { border-color: #E98665; }
  .theme-btn.active { background: #E98665; color: #000; border-color: #E98665; }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(580px, 1fr));
    gap: 1rem; max-width: 1600px; margin: 0 auto;
  }
  @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
  .panel {
    border-radius: 6px; overflow: hidden; border: 1px solid #333;
  }
  .panel-header {
    padding: 0.4rem 0.8rem; font-size: 0.7rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.04em;
    display: flex; justify-content: space-between; align-items: center;
  }
  .panel-header .lang { opacity: 0.6; font-weight: 400; }
  .code {
    padding: 0.8rem 1rem; font-family: "JetBrains Mono", "Fira Code", "SF Mono", Consolas, monospace;
    font-size: 12px; line-height: 1.55; white-space: pre; overflow-x: auto;
    min-height: 180px;
  }
  .legend {
    max-width: 1600px; margin: 2rem auto 0; padding: 1rem;
    border: 1px solid #333; border-radius: 6px;
  }
  .legend h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.8rem; }
  .swatches {
    display: flex; flex-wrap: wrap; gap: 0.6rem 1.2rem;
  }
  .swatch-item {
    display: flex; align-items: center; gap: 0.4rem; font-size: 0.75rem;
  }
  .swatch-dot {
    width: 14px; height: 14px; border-radius: 3px; border: 1px solid #555; flex-shrink: 0;
  }
</style>
</head>

// ── RENDER ──────────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function renderPanel(panel, tokens, bg, fg, headerBg) {
  const segments = panel.code();
  let html = "";
  for (const seg of segments) {
    const t = seg.token ? tokens[seg.token] : null;
    const color = t ? t.color : fg;
    const style = t && t.style === "italic" ? "font-style:italic;" :
                  t && t.style === "bold" ? "font-weight:bold;" : "";
    html += `<span style="color:${color};${style}">${escHtml(seg.text)}</span>`;
  }
  return `<div class="panel">
    <div class="panel-header" style="background:${headerBg};color:${fg}">
      <span>${panel.title}</span>
      <span class="lang">${panel.lang}</span>
    </div>
    <div class="code" style="background:${bg};color:${fg}">${html}</div>
  </div>`;
}

let activeTheme = "Dark";

function applyTheme(name) {
  activeTheme = name;
  const t = THEMES[name];
  document.querySelectorAll(".theme-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.theme === name)
  );

  document.getElementById("grid").innerHTML =
    PANELS.map(p => renderPanel(p, t.tokens, t.bg, t.fg, t.headerBg)).join("");

  const legendEl = document.getElementById("legend");
  legendEl.style.background = t.bg;
  legendEl.style.borderColor = t.headerBg;
  legendEl.querySelector("h3").style.color = t.fg;

  const sw = document.getElementById("swatches");
  sw.innerHTML = "";
  const labels = {
    keyword:"Keyword", function:"Function", variable:"Variable", parameter:"Parameter",
    property:"Property", type:"Type", constant:"Constant", enumMember:"Enum Member",
    string:"String", number:"Number", operator:"Operator", comment:"Comment",
    docComment:"Doc Comment", builtin:"Built-in", tag:"Tag", attribute:"Attribute",
    regex:"Regex", macro:"Macro", label:"Label", module:"Module",
    decorator:"Decorator", punctuation:"Punctuation"
  };
  for (const [key, lbl] of Object.entries(labels)) {
    if (!t.tokens[key]) continue;
    const item = document.createElement("div");
    item.className = "swatch-item";
    const dot = document.createElement("div");
    dot.className = "swatch-dot";
    dot.style.background = t.tokens[key].color;
    const text = document.createElement("span");
    text.textContent = `${lbl} ${t.tokens[key].color}`;
    text.style.color = t.fg;
    text.style.opacity = "0.8";
    item.appendChild(dot);
    item.appendChild(text);
    sw.appendChild(item);
  }
}

function init() {
  const btns = document.getElementById("themeButtons");
  for (const name of Object.keys(THEMES)) {
    const b = document.createElement("button");
    b.className = "theme-btn";
    b.textContent = name;
    b.dataset.theme = name;
    b.addEventListener("click", () => applyTheme(name));
    btns.appendChild(b);
  }
  applyTheme("Dark");
}

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
