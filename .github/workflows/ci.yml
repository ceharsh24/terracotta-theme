name: Theme Quality Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contrast-check:
    name: WCAG Contrast Ratio Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check contrast ratios
        run: npm test

  package-check:
    name: VSIX Packaging Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: vsce package --no-dependencies
