<title>Terracotta Theme Playground</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ui-bg: #1a1a1a;
    --ui-fg: #e0e0e0;
    --ui-border: #333;
    --ui-accent: #E98665;
    --ui-muted: #888;

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--ui-bg);
    color: var(--ui-fg);

  header {
    padding: 2rem 2rem 1rem;
    text-align: center;
    border-bottom: 1px solid var(--ui-border);

  header h1 {
    font-size: 1.75rem;
    font-weight: 600;
    color: var(--ui-accent);
  }

  header p {
    color: var(--ui-muted);
    margin-top: 0.4rem;
    font-size: 0.95rem;

  .controls {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    flex-wrap: wrap;
    padding: 1.25rem 1rem;
    border-bottom: 1px solid var(--ui-border);
  }

    padding: 0.5rem 1rem;
    border: 1px solid var(--ui-border);
    border-radius: 6px;
    background: transparent;
    color: var(--ui-fg);
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
  }

  .theme-btn:hover { border-color: var(--ui-accent); }

  .theme-btn.active {
    background: var(--ui-accent);
    color: #fff;
    border-color: var(--ui-accent);
  }

  .editor-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    padding: 1.5rem;
    max-width: 1400px;
    margin: 0 auto;

  @media (max-width: 900px) {

  .panel {
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--ui-border);

    color: inherit;

    font-size: 0.8rem;

  .editor-wrapper {
    position: relative;

  .code-input {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    color: transparent;
    caret-color: var(--ui-fg);
    border: none;
    padding: 1rem 1rem 1rem 3.5rem;

    outline: none;
    white-space: pre;
    overflow: auto;
    tab-size: 2;
    -moz-tab-size: 2;
    z-index: 2;

  .code-display {
    padding: 1rem 1rem 1rem 3.5rem;
    font-family: "JetBrains Mono", "Fira Code", "SF Mono", "Cascadia Code", Consolas, monospace;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre;
    overflow: auto;
    min-height: 400px;
    pointer-events: none;
    position: relative;
    z-index: 0;

  .line-numbers {

    top: 0; left: 0;
    width: 3rem;
    height: 100%;
    padding: 1rem 0.5rem 1rem 0;
    text-align: right;
    font-family: "JetBrains Mono", "Fira Code", "SF Mono", Consolas, monospace;
    font-size: 13px;
    line-height: 1.6;
    overflow: hidden;
    white-space: pre;

    pointer-events: none;
    z-index: 1;

    background: var(--ui-accent);
    color: #fff;

import { readFile } from "node:fs/promises";

class ThemeLoader {

  }

  python: `# Terracotta Theme - Python Preview
from dataclasses import dataclass, field
from pathlib import Path
import json
import time

CACHE_TTL: float = 60.0

@dataclass
class ThemeLoader:
    """Load and cache VS Code theme files."""
    base_path: Path
    _cache: dict = field(default_factory=dict, repr=False)

    def load(self, name: str) -> dict:
        if name in self._cache:
            data, ts = self._cache[name]
            if time.monotonic() - ts < CACHE_TTL:
                return data

        path = self.base_path / f"{name}.json"
        with open(path) as f:
            data = json.load(f)

        self._cache[name] = (data, time.monotonic())
        return data

    @property
    def cached_themes(self) -> list[str]:
        return list(self._cache.keys())

    def clear_expired(self) -> int:
        now = time.monotonic()
        expired = [
            k for k, (_, ts) in self._cache.items()
            if now - ts >= CACHE_TTL
        ]
        for key in expired:
            del self._cache[key]
        return len(expired)


loader = ThemeLoader(Path("./themes"))
theme = loader.load("terracotta-dark")
print(f"Loaded {theme['name']} ({len(theme['colors'])} colors)")`,

  rust: `// Terracotta Theme - Rust Preview
use std::collections::HashMap;
use std::fs;
use std::path::PathBuf;
use std::time::{Duration, Instant};

const CACHE_TTL: Duration = Duration::from_secs(60);

#[derive(Debug)]
struct CacheEntry {
    data: serde_json::Value,
    loaded_at: Instant,
}

pub struct ThemeLoader {
    base_path: PathBuf,
    cache: HashMap<String, CacheEntry>,
}

impl ThemeLoader {
    pub fn new(base_path: impl Into<PathBuf>) -> Self {
        Self {
            base_path: base_path.into(),
            cache: HashMap::new(),
        }
    }

    pub fn load(&mut self, name: &str) -> Result<&serde_json::Value> {
        if let Some(entry) = self.cache.get(name) {
            if entry.loaded_at.elapsed() < CACHE_TTL {
                return Ok(&entry.data);
            }
        }

        let path = self.base_path.join(format!("{name}.json"));
        let raw = fs::read_to_string(&path)?;
        let data: serde_json::Value = serde_json::from_str(&raw)?;

        self.cache.insert(name.to_owned(), CacheEntry {
            data,
            loaded_at: Instant::now(),
        });

        Ok(&self.cache[name].data)
    }

    pub fn cache_size(&self) -> usize {
        self.cache.len()
    }
}

fn main() -> Result<()> {
    let mut loader = ThemeLoader::new("./themes");
    let theme = loader.load("terracotta-dark")?;
    println!("Loaded: {}", theme["name"]);
    Ok(())
}`,

  typescript: `// Terracotta Theme - TypeScript Preview
import { readFileSync } from "node:fs";

interface ThemeColors {
  readonly bg: string;
  readonly fg: string;
  readonly accent: string;
}

type ThemeVariant = "dark" | "light" | "high-contrast";

interface Theme {
  name: string;
  variant: ThemeVariant;
  colors: ThemeColors;
  tokenColors: Record<string, string>;
}

class ThemeRegistry {
  private themes = new Map<string, Theme>();

  register(theme: Theme): void {
    this.themes.set(theme.name, theme);
  }

  get(name: string): Theme | undefined {
    return this.themes.get(name);
  }

  findByVariant(variant: ThemeVariant): Theme[] {
    return [...this.themes.values()]
      .filter((t) => t.variant === variant);
  }

  get size(): number {
    return this.themes.size;
  }
}

const registry = new ThemeRegistry();
const raw = readFileSync("./themes/dark.json", "utf-8");
const theme: Theme = JSON.parse(raw);
registry.register(theme);

const cacheTTL = 60 * time.Second

type CacheEntry struct {
\tData     map[string]interface{}
\tLoadedAt time.Time
}

type ThemeLoader struct {
\tmu       sync.RWMutex
\tbasePath string
\tcache    map[string]*CacheEntry
}

func NewThemeLoader(basePath string) *ThemeLoader {
\treturn &ThemeLoader{
\t\tbasePath: basePath,
\t\tcache:    make(map[string]*CacheEntry),
\t}

func (tl *ThemeLoader) Load(name string) (map[string]interface{}, error) {
\ttl.mu.RLock()
\tif entry, ok := tl.cache[name]; ok {
\t\tif time.Since(entry.LoadedAt) < cacheTTL {
\t\t\ttl.mu.RUnlock()
\t\t\treturn entry.Data, nil
\t\t}

  java: `// Terracotta Theme - Java Preview
package com.terracotta.theme;

import java.io.IOException;
import java.nio.file.Files;
import java.nio.file.Path;
import java.time.Duration;
import java.time.Instant;
import java.util.Map;
import java.util.Optional;
import java.util.concurrent.ConcurrentHashMap;

public class ThemeLoader {
    private static final Duration CACHE_TTL = Duration.ofSeconds(60);
    private final Path basePath;
    private final Map<String, CacheEntry> cache = new ConcurrentHashMap<>();

    private record CacheEntry(String data, Instant loadedAt) {
        boolean isExpired() {
            return Duration.between(loadedAt, Instant.now()).compareTo(CACHE_TTL) > 0;
        }
    }

    public ThemeLoader(Path basePath) {
        this.basePath = basePath;
    }

    public Optional<String> load(String name) {
        var entry = cache.get(name);
        if (entry != null && !entry.isExpired()) {
            return Optional.of(entry.data());
        }

        try {
            var path = basePath.resolve(name + ".json");
            var data = Files.readString(path);
            cache.put(name, new CacheEntry(data, Instant.now()));
            return Optional.of(data);
        } catch (IOException e) {
            System.err.println("Failed to load theme: " + e.getMessage());
            return Optional.empty();
        }
    }

    public int cacheSize() {
        return cache.size();
    }

    public static void main(String[] args) {
        var loader = new ThemeLoader(Path.of("./themes"));
        loader.load("terracotta-dark")
              .ifPresent(theme -> System.out.println("Loaded theme successfully"));
    }

function tokenize(code, lang) {
  const rules = TOKEN_RULES[lang] || TOKEN_RULES.javascript;
  const spans = [];

  for (const rule of rules) {
    const re = new RegExp(rule.re.source, rule.re.flags);
    let m;
    while ((m = re.exec(code)) !== null) {
      let start = m.index, text = m[0];
      // strip: N strips leading chars (positive) or keeps only after prefix (negative like HTML tags)
      if (rule.strip > 0) { start += rule.strip; text = text.slice(rule.strip); }
      else if (rule.strip < 0) { const n = -rule.strip; start += n; text = text.slice(n); }
      spans.push({ start, end: start + text.length, type: rule.type, text });
    }
  }

  // Sort by start, longest first for overlaps
  spans.sort((a, b) => a.start - b.start || b.end - a.end);

  // Remove overlapping spans (first wins)
  const filtered = [];
  let lastEnd = 0;
  for (const s of spans) {
    if (s.start >= lastEnd) {
      filtered.push(s);
      lastEnd = s.end;
    }
  }

  return filtered;
}

function highlight(code, lang, tokens) {
  const spans = tokenize(code, lang);
  let result = "";
  let pos = 0;

  for (const span of spans) {
    if (span.start > pos) {
      result += escapeHtml(code.slice(pos, span.start));
    }
    const token = tokens[span.type] || {};
    const color = token.color || "";
    const italic = token.italic ? "font-style:italic;" : "";
    if (color) {
      result += `<span style="color:${color};${italic}">${escapeHtml(span.text)}</span>`;
    } else {
      result += escapeHtml(span.text);
    }
    pos = span.end;
  }

  if (pos < code.length) {
    result += escapeHtml(code.slice(pos));
  }

  return result;
}

function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// ── State ────────────────────────────────────────────────────────
let activeTheme = "Dark";
let leftLang = "javascript";
let rightLang = "python";

// ── Render ───────────────────────────────────────────────────────
function applyTheme(themeName) {
  activeTheme = themeName;
  const t = THEMES[themeName];

  // Buttons
  document.querySelectorAll(".theme-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.theme === themeName);
  });

  // Panels
  for (const panel of ["panel-left", "panel-right"]) {
    const el = document.getElementById(panel);
    el.style.background = t.bg;
    el.style.borderColor = t.bg;
    el.querySelector(".panel-header").style.background = t.headerBg;
    el.querySelector(".panel-header").style.color = t.fg;
    el.querySelector(".lang-select").style.color = t.fg;
    el.querySelector(".lang-select").style.borderColor = t.lineNum;
    el.querySelector(".code-display").style.color = t.fg;
    el.querySelector(".code-input").style.caretColor = t.fg;
    el.querySelector(".line-numbers").style.color = t.lineNum;
  }

  // Selection color
  updateSelectionStyle(t.selection);

  // Swatches (adapt palette background to theme)
  const palette = document.getElementById("swatches");
  palette.style.background = t.bg;
  renderSwatches(t);
  renderCode();
}

function renderCode() {
  const t = THEMES[activeTheme];

  // Left panel
  const leftCode = document.getElementById("codeInput").value;
  document.getElementById("codeDisplay").innerHTML = highlight(leftCode, leftLang, t.tokens);
  renderLineNumbers("lineNumbers", leftCode);

  // Right panel
  const rightCode = document.getElementById("codeInput2").value;
  document.getElementById("codeDisplay2").innerHTML = highlight(rightCode, rightLang, t.tokens);
  renderLineNumbers("lineNumbers2", rightCode);
}

function renderLineNumbers(id, code) {
  const count = code.split("\n").length;
  const nums = Array.from({ length: count }, (_, i) => i + 1).join("\n");
  document.getElementById(id).textContent = nums;
}

function renderSwatches(t) {
  const container = document.getElementById("swatches");
  container.innerHTML = "";
  const labels = { comment: "Comment", string: "String", keyword: "Keyword", function: "Function",
    variable: "Variable", number: "Number", type: "Type", operator: "Operator",
    constant: "Constant", builtin: "Built-in", tag: "Tag", attribute: "Attr",
    property: "Property", punctuation: "Punct", regex: "Regex" };

  for (const [key, label] of Object.entries(labels)) {
    if (!t.tokens[key]) continue;
    const el = document.createElement("div");
    el.className = "swatch";
    el.style.background = t.tokens[key].color;
    el.dataset.label = label;
    el.title = `${label}: ${t.tokens[key].color}`;
    container.appendChild(el);
  }
}

// ── Selection style (dynamic per theme) ─────────────────────────
let selectionStyleEl = null;
function updateSelectionStyle(selectionColor) {
  if (!selectionStyleEl) {
    selectionStyleEl = document.createElement("style");
    document.head.appendChild(selectionStyleEl);
  }
  selectionStyleEl.textContent = `
    .code-input::selection { background: ${selectionColor}; }
    .code-input::-moz-selection { background: ${selectionColor}; }
  `;
}

// ── Init ─────────────────────────────────────────────────────────
function init() {
  // Theme buttons
  const btnContainer = document.getElementById("themeButtons");
  for (const name of Object.keys(THEMES)) {
    const btn = document.createElement("button");
    btn.className = "theme-btn";
    btn.textContent = name;
    btn.dataset.theme = name;
    btn.addEventListener("click", () => applyTheme(name));
    btnContainer.appendChild(btn);
  }

  // Set initial code
  document.getElementById("codeInput").value = SAMPLES.javascript;
  document.getElementById("codeInput2").value = SAMPLES.python;

  // Language selects
  document.getElementById("langSelect").addEventListener("change", (e) => {
    const textarea = document.getElementById("codeInput");
    const isCustom = textarea.value && textarea.value !== SAMPLES[leftLang];
    if (isCustom && !confirm("Replace your code with the sample for " + e.target.value + "?")) {
      e.target.value = leftLang;
      return;
    }
    leftLang = e.target.value;
    textarea.value = SAMPLES[leftLang];
    renderCode();
  });

  document.getElementById("langSelect2").addEventListener("change", (e) => {
    const textarea = document.getElementById("codeInput2");
    const isCustom = textarea.value && textarea.value !== SAMPLES[rightLang];
    if (isCustom && !confirm("Replace your code with the sample for " + e.target.value + "?")) {
      e.target.value = rightLang;
      return;
    }
    rightLang = e.target.value;
    textarea.value = SAMPLES[rightLang];
    renderCode();
  });

  // Live editing
  document.getElementById("codeInput").addEventListener("input", renderCode);
  document.getElementById("codeInput2").addEventListener("input", renderCode);

  // Tab support in textareas (Escape releases focus)
  for (const id of ["codeInput", "codeInput2"]) {
    document.getElementById(id).addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        e.target.blur();
        return;
      }
      if (e.key === "Tab") {
        e.preventDefault();
        const ta = e.target;
        const start = ta.selectionStart;
        ta.value = ta.value.slice(0, start) + "  " + ta.value.slice(ta.selectionEnd);
        ta.selectionStart = ta.selectionEnd = start + 2;
        renderCode();
      }
    });
  }

  // Sync scroll
  for (const [inputId, displayId, lineId] of [
    ["codeInput", "codeDisplay", "lineNumbers"],
    ["codeInput2", "codeDisplay2", "lineNumbers2"]
  ]) {
    document.getElementById(inputId).addEventListener("scroll", (e) => {
      const display = document.getElementById(displayId);
      const lines = document.getElementById(lineId);
      display.scrollTop = e.target.scrollTop;
      display.scrollLeft = e.target.scrollLeft;
      lines.scrollTop = e.target.scrollTop;
    });
  }

  applyTheme("Dark");
}

document.addEventListener("DOMContentLoaded", init);
</script>
